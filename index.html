<!DOCTYPE html> <!--Descreva a linguagem de progamação que está sendo utilizada, nesse caso é o HTML--> 
<html lang="pt-br"> <!--início do documento -->
<head> <!--define o cabeçalho do documento. O conteúdo descrito aqui não aparece no navegador. Essa tag serve para inserir folhas de estilo e scripts-->
    <meta charset="UTF-8"> <!--indica qual será os caracteres (character set ou charset)será utilizado para renderizar o texto da página-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head> <!--fechamento do cabeçalho do documento-->
<body><!--é o espaço em que todas as tags devem ser colocadas. O conteúdo aqui contido é visual da página. As tags que representam textos, botões e outros devem ser adicionadas nesse intervalo.-->
    
</body>
</html> <!--fim do documento-->
